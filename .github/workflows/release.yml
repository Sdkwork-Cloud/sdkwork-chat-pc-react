name: release

on:
  push:
    tags:
      - 'release-*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to publish
        required: true
        type: string
      git_ref:
        description: Git ref to build; defaults to refs/tags/<release_tag>
        required: false
        type: string
      build_environment:
        description: Desktop build environment
        required: true
        default: production
        type: choice
        options:
          - development
          - test
          - production

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  SDKWORK_SHARED_SDK_MODE: git
  SDKWORK_SHARED_SDK_APP_GIT_REF: 66af5f1c1a28213d26ddce599cd336eb9ed6aec1
  SDKWORK_SHARED_SDK_COMMON_GIT_REF: e5c7e1680e0bbc1caa19a3e40488e0e502be57d5
  SDKWORK_IM_SDK_GIT_REF: 6ba84d31c0e8f77e7d52cfb6c730ac9881283db1
  SDKWORK_SHARED_SDK_APP_REPO_URL: https://github.com/Sdkwork-Cloud/sdkwork-sdk-app.git
  SDKWORK_SHARED_SDK_COMMON_REPO_URL: https://github.com/Sdkwork-Cloud/sdkwork-sdk-commons.git
  SDKWORK_IM_SDK_REPO_URL: https://github.com/Sdkwork-Cloud/sdkwork-im-sdk.git

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      git_ref: ${{ steps.resolve.outputs.git_ref }}
      build_environment: ${{ steps.resolve.outputs.build_environment }}
    steps:
      - name: Resolve release target
        id: resolve
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            release_tag="${GITHUB_REF_NAME}"
            git_ref="${GITHUB_REF}"
            build_environment="production"
          else
            release_tag="${{ github.event.inputs.release_tag }}"
            git_ref="${{ github.event.inputs.git_ref }}"
            build_environment="${{ github.event.inputs.build_environment }}"
            if [[ -z "$git_ref" ]]; then
              git_ref="refs/tags/$release_tag"
            fi
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "git_ref=$git_ref" >> "$GITHUB_OUTPUT"
          echo "build_environment=$build_environment" >> "$GITHUB_OUTPUT"

  verify-release:
    name: Verify release inputs
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.git_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux desktop dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            file \
            libfuse2 \
            libgbm-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libjavascriptcoregtk-4.0-dev \
            libsoup2.4-dev \
            libappindicator3-dev \
            libpipewire-0.3-dev \
            libssl-dev \
            librsvg2-dev \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config \
            rpm \
            patchelf

      - name: Prepare git-backed shared SDK sources
        run: node scripts/prepare-shared-sdk-git-sources.mjs

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared SDK packages
        run: pnpm prepare:shared-sdk

      - name: Run release automation contracts
        run: pnpm run check:automation

      - name: Run workspace tests
        run: pnpm run test

      - name: Run package typecheck
        run: pnpm run typecheck:packages

      - name: Verify package boundaries
        run: pnpm run verify:packages

      - name: Run Rust desktop check
        run: cargo check --manifest-path src-tauri/Cargo.toml

  desktop-release:
    name: Desktop release (${{ matrix.platform }}-${{ matrix.arch }})
    needs: [prepare, verify-release]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2022
            platform: windows
            arch: x64
            target: x86_64-pc-windows-msvc
          - runner: windows-11-arm
            platform: windows
            arch: arm64
            target: aarch64-pc-windows-msvc
          - runner: ubuntu-22.04
            platform: linux
            arch: x64
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-22.04-arm
            platform: linux
            arch: arm64
            target: aarch64-unknown-linux-gnu
          - runner: macos-15-intel
            platform: macos
            arch: x64
            target: x86_64-apple-darwin
          - runner: macos-15
            platform: macos
            arch: arm64
            target: aarch64-apple-darwin
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.git_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux desktop dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            file \
            libfuse2 \
            libgbm-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libjavascriptcoregtk-4.0-dev \
            libsoup2.4-dev \
            libappindicator3-dev \
            libpipewire-0.3-dev \
            libssl-dev \
            librsvg2-dev \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config \
            rpm \
            patchelf

      - name: Prepare git-backed shared SDK sources
        run: node scripts/prepare-shared-sdk-git-sources.mjs

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared SDK packages
        run: pnpm prepare:shared-sdk

      - name: Build desktop bundle
        if: matrix.platform != 'macos'
        run: node scripts/run-tauri-cli.mjs build --vite-mode ${{ needs.prepare.outputs.build_environment }} --target ${{ matrix.target }}

      - name: Build macOS desktop bundle
        if: matrix.platform == 'macos'
        run: node scripts/run-tauri-cli.mjs build --vite-mode ${{ needs.prepare.outputs.build_environment }} --target ${{ matrix.target }} --bundles app

      - name: Collect desktop release assets
        run: node scripts/release/package-release-assets.mjs desktop --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} --target ${{ matrix.target }} --output-dir artifacts/release

      - name: Upload desktop release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/release/**/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - prepare
      - verify-release
      - desktop-release
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: OpenChat ${{ needs.prepare.outputs.release_tag }}
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            release-assets/**/*
