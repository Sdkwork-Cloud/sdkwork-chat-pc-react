name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  SDKWORK_SHARED_SDK_MODE: git
  SDKWORK_SHARED_SDK_APP_GIT_REF: 66af5f1c1a28213d26ddce599cd336eb9ed6aec1
  SDKWORK_SHARED_SDK_COMMON_GIT_REF: e5c7e1680e0bbc1caa19a3e40488e0e502be57d5
  SDKWORK_IM_SDK_GIT_REF: 6ba84d31c0e8f77e7d52cfb6c730ac9881283db1
  SDKWORK_SHARED_SDK_APP_REPO_URL: https://github.com/Sdkwork-Cloud/sdkwork-sdk-app.git
  SDKWORK_SHARED_SDK_COMMON_REPO_URL: https://github.com/Sdkwork-Cloud/sdkwork-sdk-commons.git
  SDKWORK_IM_SDK_REPO_URL: https://github.com/Sdkwork-Cloud/sdkwork-im-sdk.git

jobs:
  workspace-verify:
    name: Workspace verify
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux desktop dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            file \
            libfuse2 \
            libgbm-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libjavascriptcoregtk-4.0-dev \
            libsoup2.4-dev \
            libappindicator3-dev \
            libpipewire-0.3-dev \
            libssl-dev \
            librsvg2-dev \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config \
            rpm \
            patchelf

      - name: Prepare git-backed shared SDK sources
        run: node scripts/prepare-shared-sdk-git-sources.mjs

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared SDK packages
        run: pnpm prepare:shared-sdk

      - name: Run automation contract checks
        run: pnpm run check:automation

      - name: Run workspace tests
        run: pnpm run test

      - name: Run workspace package typecheck
        run: pnpm run typecheck:packages

      - name: Verify workspace package boundaries
        run: pnpm run verify:packages

      - name: Run Rust desktop check
        run: cargo check --manifest-path src-tauri/Cargo.toml

  desktop-windows-check:
    name: Desktop Rust check (windows)
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Prepare git-backed shared SDK sources
        run: node scripts/prepare-shared-sdk-git-sources.mjs

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared SDK packages
        run: pnpm prepare:shared-sdk

      - name: Run automation contract checks
        run: pnpm run check:automation

      - name: Run workspace package typecheck
        run: pnpm run typecheck:packages

      - name: Run Rust desktop check
        run: cargo check --manifest-path src-tauri/Cargo.toml
